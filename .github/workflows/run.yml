name: Zlato-Robot

on:
  schedule:
    # 09:05, 15:35, 20:05 (UTC časy)
    - cron: '05 07 * * 1-5'
    - cron: '35 13 * * 1-5'
    - cron: '05 18 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install TextBlob corpora
        run: python -m textblob.download_corpora

      - name: Run trading robot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python src/robot.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: robot-logs
          path: logs/
