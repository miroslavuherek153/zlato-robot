name: Zlato-Robot
on:
  on:
  schedule:
    - cron: '05 07 * * *'  # Každý den v 09:05
    - cron: '35 13 * * *'  # Každý den v 15:35
    - cron: '05 18 * * *'  # Každý den v 20:05 (Přidali jsme večerní kontrolu)
  workflow_dispatch: # Umožní spustit i ručně
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python robot.py
