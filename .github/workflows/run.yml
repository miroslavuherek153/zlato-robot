name: Gold Robot Run

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install pandas pandas-ta yfinance
      - name: Run Robot
        run: python robot.py
      - name: Save Results
        run: |
          git config --global user.name 'Zlato Robot'
          git config --global user.email 'robot@zlato.cz'
          git add data.json
          git commit -m "Update analysis" || exit 0
          git push
