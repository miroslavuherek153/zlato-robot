<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>

    <style>
        :root {
            --bg: #050608;
            --card-bg: #0d1117;
            --card-border: #1f2933;
            --accent: #f1c40f;
            --accent-soft: #f39c12;
            --text-main: #f5f5f5;
            --text-muted: #9ca3af;
            --bull: #22c55e;
            --bear: #ef4444;
            --flat: #eab308;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #111827 0, #020617 55%);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 24px 12px 8px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }

        #status {
            margin-top: 8px;
            font-size: 13px;
        }

        .status-ok {
            color: #4ade80;
        }

        .status-error {
            color: #f97373;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto 40px;
            padding: 0 12px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: linear-gradient(145deg, #020617, #020617 40%, #0b1120);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            padding: 16px 16px 14px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.45);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.12;
            background: radial-gradient(circle at top left, rgba(241,196,15,0.35), transparent 55%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .symbol {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-soft);
        }

        .ticker {
            font-size: 13px;
            color: var(--text-muted);
        }

        .price {
            font-size: 18px;
            font-weight: 600;
        }

        .price-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0 10px;
            position: relative;
            z-index: 1;
        }

        .pill {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.5);
            color: var(--text-muted);
            background: rgba(15,23,42,0.8);
        }

        .pill-strong {
            border-color: rgba(250,204,21,0.8);
            color: var(--accent);
            background: rgba(24,24,27,0.9);
        }

        .pill-bull {
            border-color: rgba(34,197,94,0.8);
            color: var(--bull);
        }

        .pill-bear {
            border-color: rgba(239,68,68,0.8);
            color: var(--bear);
        }

        .row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 3px 0;
            position: relative;
            z-index: 1;
        }

        .row-label {
            color: var(--text-muted);
        }

        .row-value {
            font-weight: 500;
        }

        .row-small {
            font-size: 12px;
        }

        .plan {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px dashed rgba(55,65,81,0.8);
            position: relative;
            z-index: 1;
        }

        .plan-title {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .plan-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 2px 10px;
            font-size: 12px;
        }

        .plan-label {
            color: var(--text-muted);
        }

        .plan-value {
            font-weight: 500;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .link {
            color: #38bdf8;
            text-decoration: none;
            font-size: 11px;
        }

        .link:hover {
            text-decoration: underline;
        }

        .tf-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
            font-size: 10px;
        }

        .tf-badge {
            padding: 2px 6px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.6);
            color: var(--text-muted);
            background: rgba(15,23,42,0.9);
        }

        .tf-badge-main {
            border-color: rgba(250,204,21,0.9);
            color: var(--accent);
        }

        @media (max-width: 600px) {
            header {
                padding-top: 18px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>📊 Trading Dashboard</h1>
    <div class="subtitle">Aktuální signály, trend, sentiment a obchodní plán</div>
    <div id="status">Načítám data…</div>
</header>

<div class="container" id="cards"></div>

<script>
    // Připraveno na multi-timeframe: backend může později posílat např. data[symbol].timeframes = { "5m": {...}, "1h": {...} }
    const url = "https://miroslavuherek153.github.io/zlato-robot/data.json";

    function classifyTrend(trend) {
        if (!trend) return "";
        const t = trend.toUpperCase();
        if (t.includes("LONG") || t.includes("UP")) return "bull";
        if (t.includes("SHORT") || t.includes("DOWN")) return "bear";
        return "flat";
    }

    function trendEmoji(trend) {
        const t = classifyTrend(trend);
        if (t === "bull") return "🟢";
        if (t === "bear") return "🔴";
        return "🟡";
    }

    async function loadData() {
        try {
            const response = await fetch(url + "?t=" + Date.now());
            if (!response.ok) {
                document.getElementById("status").innerText = "Chyba načítání data.json";
                document.getElementById("status").className = "status-error";
                return;
            }

            const data = await response.json();
            document.getElementById("status").innerText = "Data načtena ✓";
            document.getElementById("status").className = "status-ok";

            const container = document.getElementById("cards");
            container.innerHTML = "";

            Object.keys(data).forEach(symbol => {
                if (symbol === "updated") return;

                const d = data[symbol];

                // Multi-timeframe příprava:
                // pokud backend někdy pošle d.timeframes = { "5m": {...}, "1h": {...} },
                // můžeme tady zobrazit přepínače nebo souhrn.
                // Zatím zobrazujeme hlavní (aktuální) TF jako "5m".
                const mainTf = "5m";

                const trendClass = classifyTrend(d.trend);
                let priceColor = "#e5e7eb";
                if (trendClass === "bull") priceColor = "#4ade80";
                else if (trendClass === "bear") priceColor = "#f97373";
                else if (trendClass === "flat") priceColor = "#eab308";

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="symbol">${d.nazev}</div>
                            <div class="ticker">${d.symbol}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="price" style="color:${priceColor};">${d.price}</div>
                            <div class="price-label">aktuální cena</div>
                        </div>
                    </div>

                    <div class="pill-row">
                        <div class="pill pill-strong">TF: ${mainTf}</div>
                        <div class="pill ${trendClass === "bull" ? "pill-bull" : trendClass === "bear" ? "pill-bear" : ""}">
                            Trend: ${d.trend} ${trendEmoji(d.trend)}
                        </div>
                        <div class="pill">
                            Predikce: ${d.prediction} (score ${d.prediction_score})
                        </div>
                        <div class="pill">
                            Sentiment: ${d.sentiment}
                        </div>
                    </div>

                    <div class="row">
                        <div class="row-label">RSI</div>
                        <div class="row-value">${d.rsi}</div>
                    </div>
                    <div class="row">
                        <div class="row-label">ATR</div>
                        <div class="row-value">${d.atr}</div>
                    </div>

                    <div class="plan">
                        <div class="plan-title">🎯 Obchodní plán</div>
                        <div class="plan-grid">
                            <div class="plan-label">Vstup</div>
                            <div class="plan-value">${d.entry}</div>
                            <div class="plan-label">SL</div>
                            <div class="plan-value">${d.stop_loss}</div>
                            <div class="plan-label">TP</div>
                            <div class="plan-value">${d.take_profit}</div>
                            <div class="plan-label">Objem</div>
                            <div class="plan-value">${d.volume}</div>
                        </div>
                    </div>

                    <div class="footer-row">
                        <a class="link" href="https://www.tradingview.com/symbols/${d.symbol.replace('=F','')}" target="_blank">
                            📈 Otevřít graf
                        </a>
                        <div>Aktualizováno: ${d.timestamp}</div>
                    </div>
                `;

                container.appendChild(card);
            });

        } catch (e) {
            document.getElementById("status").innerText = "Chyba načítání data.json";
            document.getElementById("status").className = "status-error";
        }
    }

    loadData();
</script>

</body>
</html>
