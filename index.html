<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>

    <style>
        body {
            background-color: #000;
            color: #f1c40f;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 42px;
        }

        .container {
            margin: 40px auto;
            max-width: 900px;
        }

        .card {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .symbol {
            font-size: 26px;
            font-weight: bold;
            color: #f39c12;
        }

        .row {
            margin: 8px 0;
        }

        a {
            color: #3498db;
        }
    </style>
</head>
<body>

    <h1>📊 Trading Dashboard</h1>
    <p id="status">Načítám data…</p>

    <div class="container" id="cards"></div>

    <script>
        // 🔥 OPRAVENÁ URL — TADY BYLA CHYBA
        const url = "https://miroslavuherek153.github.io/zlato-robot/data.json";

        async function loadData() {
            try {
                const response = await fetch(url + "?t=" + Date.now()); // cache bypass
                if (!response.ok) {
                    document.getElementById("status").innerText = "Chyba načítání data.json";
                    return;
                }

                const data = await response.json();
                document.getElementById("status").innerText = "Data načtena ✔";

                const container = document.getElementById("cards");
                container.innerHTML = "";

                Object.keys(data).forEach(symbol => {
                    if (symbol === "updated") return;

                    const d = data[symbol];

                    const card = `
                        <div class="card">
                            <div class="symbol">${d.nazev} (${d.symbol})</div>

                            <div class="row">💰 Cena: <b>${d.price}</b></div>
                            <div class="row">📈 Trend: <b>${d.trend}</b></div>
                            <div class="row">📊 Predikce: <b>${d.prediction}</b> (score ${d.prediction_score})</div>
                            <div class="row">🧠 Sentiment: <b>${d.sentiment}</b></div>
                            <div class="row">📉 RSI: <b>${d.rsi}</b></div>
                            <div class="row">📏 ATR: <b>${d.atr}</b></div>

                            <div class="row">
                                🎯 Obchodní plán:<br>
                                Vstup: <b>${d.entry}</b><br>
                                SL: <b>${d.stop_loss}</b><br>
                                TP: <b>${d.take_profit}</b><br>
                                Objem: <b>${d.volume}</b>
                            </div>

                            <div class="row">
                                📈 <a href="https://www.tradingview.com/symbols/${d.symbol.replace('=F','')}" target="_blank">
                                    Otevřít graf
                                </a>
                            </div>

                            <div class="row" style="color:#888; font-size:12px;">
                                Aktualizováno: ${d.timestamp}
                            </div>
                        </div>
                    `;

                    container.innerHTML += card;
                });

            } catch (e) {
                document.getElementById("status").innerText = "Chyba načítání data.json";
            }
        }

        loadData();
    </script>

</body>
</html>
