<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Gold Signal Terminal</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --gold: #fbbf24;
            --text: #f8fafc;
            --green: #22c55e;
            --red: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border-top: 5px solid var(--gold);
        }
        h1 { text-align: center; color: var(--gold); margin-bottom: 1.5rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        .label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 0.2rem; }
        .value { font-size: 1.2rem; font-weight: bold; }
        .signal-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        .wait { background: #334155; color: #cbd5e1; }
        .long { background: var(--green); color: white; animation: pulse 2s infinite; }
        .short { background: var(--red); color: white; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .footer { text-align: center; font-size: 0.7rem; color: #64748b; margin-top: 1.5rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>XAUUSD TERMINAL</h1>
    
    <div class="stat-grid">
        <div class="stat-card">
            <span class="label">Aktuální Cena</span>
            <div id="price" class="value">Načítám...</div>
        </div>
        <div class="stat-card">
            <span class="label">H1 Trend</span>
            <div id="trend" class="value">-</div>
        </div>
        <div class="stat-card">
            <span class="label">RSI (M15)</span>
            <div id="rsi" class="value">-</div>
        </div>
        <div class="stat-card">
            <span class="label">Pár</span>
            <div class="value">Gold Spot</div>
        </div>
    </div>

    <div id="signal-container" class="signal-box wait">
        ČEKÁM NA DATA
    </div>

    <div id="trade-levels" style="display: none; margin-top: 1rem;">
        <div class="stat-grid">
            <div class="stat-card" style="border-left: 4px solid var(--red);">
                <span class="label">Stop-Loss</span>
                <div id="sl" class="value">-</div>
            </div>
            <div class="stat-card" style="border-left: 4px solid var(--green);">
                <span class="label">Take-Profit</span>
                <div id="tp" class="value">-</div>
            </div>
        </div>
    </div>

    <div class="footer">
        Data se aktualizují každých 15 minut pomocí GitHub Actions.
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            // Načte JSON soubor vygenerovaný robotem
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();

            // Naplnění textových polí
            document.getElementById('price').innerText = '$' + data.cena;
            document.getElementById('trend').innerText = data.trend_h1;
            document.getElementById('rsi').innerText = data.rsi;

            const signalBox = document.getElementById('signal-container');
            const levels = document.getElementById('trade-levels');

            // Logika barev a signálů
            if (data.akce.includes('LONG')) {
                signalBox.innerText = data.akce;
                signalBox.className = 'signal-box long';
                levels.style.display = 'block';
                document.getElementById('sl').innerText = data.sl;
                document.getElementById('tp').innerText = data.tp;
            } else if (data.akce.includes('SHORT')) {
                signalBox.innerText = data.akce;
                signalBox.className = 'signal-box short';
                levels.style.display = 'block';
                document.getElementById('sl').innerText = data.sl;
                document.getElementById('tp').innerText = data.tp;
            } else {
                signalBox.innerText = 'ČEKAT (ŽÁDNÝ VSTUP)';
                signalBox.className = 'signal-box wait';
                levels.style.display = 'none';
            }
        } catch (error) {
            console.error('Chyba při načítání dat:', error);
        }
    }

    // Spustit hned a pak každých 60 sekund
    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>

</body>
</html>
