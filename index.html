<div class="terminal">
    <h1>XAUUSD H1 STRATEGY</h1>
    <div class="grid">
        <div class="box"><span class="label">Aktuální Cena</span><div class="value" id="price">...</div></div>
        <div class="box"><span class="label">VWAP Hladina</span><div class="value" id="vwap">...</div></div>
        <div class="box"><span class="label">Doporučený Vstup</span><div class="value" id="vstup">...</div></div>
        <div class="box"><span class="label">Trh</span><div class="value">XAUUSD (Gold)</div></div>
    </div>
    
    <div id="signal" class="main-signal">NAČÍTÁM STRATEGII...</div>

    <div class="grid">
        <div class="box" style="border-bottom: 4px solid #ef4444;"><span class="label">Stop-Loss (4.5b)</span><div class="value" id="sl">...</div></div>
        <div class="box" style="border-bottom: 4px solid #22c55e;"><span class="label">Take-Profit (2b)</span><div class="value" id="tp">...</div></div>
    </div>
    <div class="footer">Strategie: Vstup pod/nad H1 svíci dle VWAP (07:00+). [cite: 1, 6]</div>
</div>

<script>
    async function update() {
        const res = await fetch('data.json?t=' + Date.now());
        const d = await res.json();
        
        document.getElementById('price').innerText = d.cena;
        document.getElementById('vwap').innerText = d.vwap;
        document.getElementById('vstup').innerText = d.vstup;
        document.getElementById('sl').innerText = d.sl;
        document.getElementById('tp').innerText = d.tp;
        
        const sig = document.getElementById('signal');
        sig.innerText = d.akce;
        
        if(d.akce.includes('SHORT')) { sig.style.background = '#ef4444'; }
        else if(d.akce.includes('LONG')) { sig.style.background = '#22c55e'; }
        else { sig.style.background = '#3c4858'; }
    }
    update();
    setInterval(update, 60000);
</script>
