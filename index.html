<script>
    async function updateStrategy() {
        try {
            // Získání dat (PAXGUSDT na Binance = Zlato)
            const res = await fetch('https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=1h&limit=2');
            const data = await res.json();
            
            const lastCandle = data[0]; 
            const currentPrice = parseFloat(data[1][4]); 
            const openH1 = parseFloat(data[1][0]); // Začátek aktuální hodiny (náhrada za VWAP)

            const highH1 = parseFloat(lastCandle[2]);
            const lowH1 = parseFloat(lastCandle[3]);

            const panel = document.getElementById('trade-panel');
            
            // AGRESIVNÍ LOGIKA - ukáže setup vždy
            if (currentPrice < highH1 && currentPrice > lowH1) {
                // Cena je uvnitř svíce - připravujeme se
                document.getElementById('setup-label').innerText = "PŘÍPRAVA NA VSTUP";
            } else {
                document.getElementById('setup-label').innerText = "AKTIVNÍ SIGNÁL";
            }

            // Rozhodnutí o směru (Cena vs Open)
            if (currentPrice < openH1) {
                // SHORT SETUP
                panel.className = "info-box sell-theme";
                document.getElementById('setup-title').innerText = "▼ SHORT (PRODEJ)";
                
                const entry = (lowH1 - 0.20).toFixed(2); // Vstup kousek pod Low
                document.getElementById('val-entry').innerText = entry;
                document.getElementById('val-sl').innerText = (parseFloat(entry) + 4.5).toFixed(2);
                document.getElementById('val-tp').innerText = (parseFloat(entry) - 2.0).toFixed(2);
            } else {
                // LONG SETUP
                panel.className = "info-box buy-theme";
                document.getElementById('setup-title').innerText = "▲ LONG (NÁKUP)";
                
                const entry = (highH1 + 0.20).toFixed(2); // Vstup kousek nad High
                document.getElementById('val-entry').innerText = entry;
                document.getElementById('val-sl').innerText = (parseFloat(entry) - 4.5).toFixed(2);
                document.getElementById('val-tp').innerText = (parseFloat(entry) + 2.0).toFixed(2);
            }

        } catch (e) { 
            document.getElementById('setup-title').innerText = "Aktualizace..."; 
        }
    }

    setInterval(updateStrategy, 3000); // Rychlejší refresh - každé 3 sekundy
    updateStrategy();
</script>
