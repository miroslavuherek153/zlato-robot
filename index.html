<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>

    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #f1c40f;
            text-align: center;
        }

        .symbol-block {
            background: #161b22;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }

        .tf-buttons button {
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #21262d;
            color: #e6edf3;
        }

        .tf-buttons button.active {
            background: #f1c40f;
            color: #000;
            font-weight: bold;
        }

        .tf-data {
            margin-top: 15px;
            padding: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<h1>📊 Trading Dashboard</h1>
<p style="text-align:center; opacity:0.8;">Multi-timeframe analýza, trend, sentiment a obchodní plán (5m)</p>

<div id="content"></div>

<script>
const AVAILABLE_TF = ["5m", "30m", "1h", "4h", "1d"];

async function loadData() {
    try {
        const response = await fetch("data.json?cache=" + Date.now());
        if (!response.ok) throw new Error("Chyba načítání data.json");

        const data = await response.json();
        renderDashboard(data);
    } catch (err) {
        document.getElementById("content").innerHTML =
            `<p class="error">❌ Chyba načítání data.json</p>`;
    }
}

function renderDashboard(data) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    Object.keys(data).forEach(symbol => {
        if (symbol === "updated") return;

        const item = data[symbol];
        const tfBlocks = item.timeframes;

        let html = `
            <div class="symbol-block">
                <h2>${item.nazev} — ${symbol}</h2>
                <p><strong>Cena:</strong> ${item.price}</p>
                <p><strong>Sentiment:</strong> ${item.sentiment}</p>
                <p><strong>Predikce:</strong> ${item.prediction} (${item.prediction_score})</p>

                <div class="tf-buttons">
        `;

        AVAILABLE_TF.forEach(tf => {
            html += `<button onclick="showTF('${symbol}', '${tf}')">${tf}</button>`;
        });

        html += `</div>`;

        html += `<div id="tf-${symbol}" class="tf-data">Klikni na timeframe…</div>`;
        html += `</div>`;

        container.innerHTML += html;
    });
}

function showTF(symbol, tf) {
    const block = document.getElementById(`tf-${symbol}`);
    const data = window.dashboardData[symbol].timeframes[tf];

    if (!data) {
        block.innerHTML = `<p>❌ Data nejsou dostupná</p>`;
        return;
    }

    block.innerHTML = `
        <p><strong>VWAP:</strong> ${data.vwap.toFixed(2)}</p>
        <p><strong>RSI:</strong> ${data.rsi.toFixed(2)}</p>
        <p><strong>ATR:</strong> ${data.atr}</p>
        <p><strong>Trend:</strong> ${data.trend}</p>
        <p><strong>Predikce:</strong> ${data.prediction} (${data.prediction_score})</p>
    `;
}

loadData().then(() => {
    fetch("data.json?cache=" + Date.now())
        .then(r => r.json())
        .then(j => window.dashboardData = j);
});
</script>

</body>
</html>
