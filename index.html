<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Trading Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #f1c40f;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .title {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .value {
            font-size: 18px;
            margin: 4px 0;
        }
        .green { color: #2ecc71; }
        .red { color: #e74c3c; }
        .yellow { color: #f1c40f; }
        .small {
            font-size: 12px;
            color: #aaa;
        }
        a {
            color: #3498db;
        }
    </style>
</head>
<body>

<h1>📊 Trading Dashboard</h1>
<p class="small" id="updated"></p>

<div class="container" id="cards"></div>

<script>
async function loadData() {
    const url = "https://miroslavuherek153.github.io/zlato-robot/data.json";

    try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById("updated").innerText =
            "Aktualizováno: " + new Date(data.updated).toLocaleString("cs-CZ");

        const container = document.getElementById("cards");
        container.innerHTML = "";

        Object.keys(data).forEach(key => {
            if (key === "updated") return;

            const s = data[key];

            const trendColor =
                s.trend.includes("LONG") ? "green" :
                s.trend.includes("SHORT") ? "red" : "yellow";

            const sentimentColor =
                s.sentiment > 60 ? "green" :
                s.sentiment >= 40 ? "yellow" : "red";

            const card = `
                <div class="card">
                    <div class="title">${s.nazev}</div>

                    <div class="value ${trendColor}">
                        Trend: ${s.trend}
                    </div>

                    <div class="value">
                        Cena: ${s.price.toFixed(2)}
                    </div>

                    <div class="value">
                        VWAP: ${s.vwap.toFixed(2)}
                    </div>

                    <div class="value">
                        RSI: ${s.rsi.toFixed(0)}
                    </div>

                    <div class="value ${sentimentColor}">
                        Sentiment: ${s.sentiment.toFixed(0)} / 100
                    </div>

                    <div class="value">
                        Predikce: ${s.prediction} (${s.prediction_score})
                    </div>

                    <div class="value">
                        Vstup: ${s.entry.toFixed(2)}<br>
                        Stop: ${s.stop_loss.toFixed(2)}<br>
                        Target: ${s.take_profit.toFixed(2)}
                    </div>

                    <div class="value">
                        Objem: ${s.volume} ks
                    </div>

                    <div class="value">
                        <a href="https://www.tradingview.com/symbols/${key.replace('=F','')}" target="_blank">
                            Otevřít graf
                        </a>
                    </div>
                </div>
            `;

            container.innerHTML += card;
        });

    } catch (e) {
        document.getElementById("updated").innerText =
            "Chyba načítání dat.json";
    }
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
