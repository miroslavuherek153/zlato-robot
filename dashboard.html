<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD H1 Strategy Terminal</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --gold: #f0b90b;
            --green: #2ebd85;
            --red: #f6465d;
            --text: #eaecef;
            --text-dim: #848e9c;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .terminal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--gold);
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .price-section {
            text-align: center;
            margin-bottom: 24px;
        }

        #current-price {
            font-size: 3rem;
            font-weight: bold;
            margin: 8px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.75rem;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .val {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .signal-banner {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 24px;
            border: 1px solid transparent;
        }

        .wait { background: #2b2f36; color: var(--text-dim); }
        .long { background: rgba(46, 189, 133, 0.15); color: var(--green); border-color: var(--green); }
        .short { background: rgba(246, 70, 93, 0.15); color: var(--red); border-color: var(--red); }

        .levels {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .level-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .level-label { font-weight: 500; }
        .level-val { font-family: monospace; font-size: 1.1rem; }

        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="terminal">
        <header>
            <h1>XAUUSD H1 Monitor</h1>
        </header>

        <div class="price-section">
            <span class="label">Aktuální cena zlata</span>
            <div id="current-price">----.--</div>
        </div>

        <div class="grid">
            <div class="stat-box">
                <span class="label">VWAP (H1)</span>
                <div id="vwap-val" class="val">----.--</div>
            </div>
            <div class="stat-box">
                <span class="label">Session Čas</span>
                <div class="val">07:00 - 12:00</div>
            </div>
        </div>

        <div id="signal-box" class="signal-banner wait">
            HLEDÁM SETUP...
        </div>

        <div class="levels">
            <div class="level-row">
                <span class="level-label">Doporučený vstup:</span>
                <span id="vstup-val" class="level-val">---</span>
            </div>
            <div class="level-row" style="color: var(--red);">
                <span>Stop Loss (4.5b):</span>
                <span id="sl-val" class="level-val">---</span>
            </div>
            <div class="level-row" style="color: var(--green);">
                <span>Take Profit (2b):</span>
                <span id="tp-val" class="level-val">---</span>
            </div>
        </div>
    </div>
    
    <footer>
        Strategie: Vstup pod Low / nad High H1 svíce dle VWAP [cite: 6]<br>
        Aktualizace: Každých 15 minut přes GitHub Actions
    </footer>
</div>

<script>
    async function updateDashboard() {
        try {
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();

            document.getElementById('current-price').innerText = data.cena.toFixed(2);
            document.getElementById('vwap-val').innerText = data.vwap.toFixed(2);
            document.getElementById('vstup-val').innerText = data.vstup !== "-" ? data.vstup.toFixed(2) : "-";
            document.getElementById('sl-val').innerText = data.sl !== "-" ? data.sl.toFixed(2) : "-";
            document.getElementById('tp-val').innerText = data.tp !== "-" ? data.tp.toFixed(2) : "-";

            const signalBox = document.getElementById('signal-box');
            signalBox.innerText = data.akce;

            if (data.akce.includes('SHORT')) {
                signalBox.className = 'signal-banner short';
            } else if (data.akce.includes('LONG')) {
                signalBox.className = 'signal-banner long';
            } else {
                signalBox.className = 'signal-banner wait';
            }
        } catch (error) {
            console.error('Chyba při načítání dat:', error);
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>

</body>
</html>
