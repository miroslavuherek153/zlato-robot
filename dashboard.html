<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD | H1 Pro Terminal</title>
    <style>
        :root {
            --bg: #111827;
            --card: #1f2937;
            --gold: #f59e0b;
            --green: #10b981;
            --red: #ef4444;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #374151;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .terminal {
            background: var(--card);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.4rem;
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .status-banner {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            background: #2d3748;
            border: 1px solid var(--border);
        }

        .buy { color: var(--green); border-color: var(--green); background: rgba(16,185,129,0.1); }
        .sell { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.1); }

        .levels {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            display: flex;
            justify-content: space-around;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <h1>XAUUSD H1 Terminal</h1>

    <div class="grid">
        <div class="box">
            <span class="label">Aktuální Cena</span>
            <div class="value" id="price">----.--</div>
        </div>
        <div class="box">
            <span class="label">VWAP Hladina</span>
            <div class="value" id="vwap">----.--</div>
        </div>
        <div class="box">
            <span class="label">Doporučený Vstup</span>
            <div class="value" id="entry">---</div>
        </div>
        <div class="box">
            <span class="label">Pár</span>
            <div class="value">Gold Spot</div>
        </div>
    </div>

    <div id="signal" class="status-banner">ANALÝZA TRHU...</div>

    <div class="levels">
        <div style="text-align: center;">
            <span class="label" style="color: var(--red);">Stop-Loss (4.5b)</span>
            <div class="value" id="sl">---</div>
        </div>
        <div style="text-align: center;">
            <span class="label" style="color: var(--green);">Take-Profit (2b)</span>
            <div class="value" id="tp">---</div>
        </div>
    </div>

    <div class="footer">
        Strategie: H1 svíce + VWAP (07:00+) <br>
        Aktualizace: Každých 15 minut (GitHub Actions)
    </div>
</div>

<script>
    async function update() {
        try {
            const res = await fetch('data.json?t=' + Date.now());
            const d = await res.json();
            
            document.getElementById('price').innerText = d.cena;
            document.getElementById('vwap').innerText = d.vwap;
            document.getElementById('entry').innerText = d.vstup;
            document.getElementById('sl').innerText = d.sl;
            document.getElementById('tp').innerText = d.tp;
            
            const sig = document.getElementById('signal');
            sig.innerText = d.akce;
            sig.className = 'status-banner';
            
            if(d.akce.includes('LONG')) sig.classList.add('buy');
            else if(d.akce.includes('SHORT')) sig.classList.add('sell');
        } catch(e) { console.error("Chyba načítání dat."); }
    }
    update();
    setInterval(update, 60000);
</script>

</body>
</html>
