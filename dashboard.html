<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Terminal | H1 Strategy</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --gold: #f0b90b;
            --green: #2ebd85;
            --red: #f6465d;
            --text-main: #eaecef;
            --text-dim: #848e9c;
            --border: #2b3139;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'BinancePlex', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 450px;
            padding: 15px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.1rem; color: var(--gold); margin: 0; text-transform: uppercase; }

        .price-display {
            text-align: center;
            margin-bottom: 25px;
        }

        .current-price {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin: 5px 0;
        }

        .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #2b3139;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }

        .signal-banner {
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .wait { background: #3c444e; color: #929aa5; }
        .buy { background: rgba(46, 189, 133, 0.2); color: var(--green); border: 1px solid var(--green); }
        .sell { background: rgba(246, 70, 93, 0.2); color: var(--red); border: 1px solid var(--red); }

        .trade-levels {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
        }

        .level-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .level-row:last-child { margin-bottom: 0; }

        footer {
            margin-top: 15px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="card">
        <header>
            <h1>XAUUSD Monitor</h1>
            <span id="status-dot" style="color: var(--green)">● LIVE</span>
        </header>

        <div class="price-display">
            <span class="label">Aktuální spotová cena</span>
            <div class="current-price" id="price">----.--</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="label">VWAP Hladina</span>
                <div class="stat-value" id="vwap">----.--</div>
            </div>
            <div class="stat-item">
                <span class="label">H1 Trend</span>
                <div class="stat-value" id="trend">---</div>
            </div>
        </div>

        <div id="signal-box" class="signal-banner wait">
            Načítám analýzu...
        </div>

        <div class="trade-levels">
            <div class="level-row">
                <span class="label">Doporučený vstup</span>
                <span class="stat-value" id="entry">--</span>
            </div>
            <div class="level-row">
                <span class="label" style="color: var(--red)">Stop Loss (4.5b)</span>
                <span class="stat-value" id="sl" style="color: var(--red)">--</span>
            </div>
            <div class="level-row">
                <span class="label" style="color: var(--green)">Take Profit (2b)</span>
                <span class="stat-value" id="tp" style="color: var(--green)">--</span>
            </div>
        </div>
    </div>

    <footer>
        Strategie: Vstup pod/nad H1 svíci dle VWAP [cite: 6, 49]<br>
        Aktualizováno každých 15 minut (GitHub Actions)
    </footer>
</div>

<script>
    async function fetchData() {
        try {
            const url = 'https://raw.githubusercontent.com/miroslavuherek153/zlato-robot/main/data.json';
            const response = await fetch(url + '?t=' + Date.now());
            const data = await response.json();

            document.getElementById('price').innerText = data.cena;
            document.getElementById('vwap').innerText = data.vwap;
            document.getElementById('trend').innerText = data.trend;
            document.getElementById('entry').innerText = data.vstup;
            document.getElementById('sl').innerText = data.sl;
            document.getElementById('tp').innerText = data.tp;

            const box = document.getElementById('signal-box');
            box.innerText = data.akce;

            if (data.akce.includes('SHORT')) {
                box.className = 'signal-banner sell';
            } else if (data.akce.includes('LONG')) {
                box.className = 'signal-banner buy';
            } else {
                box.className = 'signal-banner wait';
            }
        } catch (e) {
            console.error("Chyba při načítání dat:", e);
        }
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
